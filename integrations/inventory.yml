# Cognee Integrations Inventory
#
# Tracks all integrations in this monorepo.
# Update this file when adding or migrating integrations.
#
# migration_status values:
#   done       – code lives in this monorepo and is the primary dev location
#   pending    – still in its own repo, migration planned
#   skipped    – migration deferred (e.g. repo inaccessible)
#
# TODO: CI currently only runs import smoke tests. To run the example scripts
#       as integration tests we need CI secrets (LLM_API_KEY, GOOGLE_API_KEY,
#       etc.) provisioned per integration. Track and resolve before v1 release.

integrations:

  # ── Already in monorepo ────────────────────────────────────────────

  - slug: openclaw
    name: "Memory (Cognee) for OpenClaw"
    owner: cognee
    language: typescript
    registry: npm
    package_name: "@cognee/cognee-openclaw"
    cognee_dependency: http-api
    current_version: "2026.2.4"
    migration_status: done
    notes: "OpenClaw plugin with auto-recall/capture hooks"

